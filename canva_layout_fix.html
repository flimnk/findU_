<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Organizador de imagens para PDF/Canva</title>
  <style>
    @page {
      size: A4;
      margin: 18mm 18mm 16mm;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: #e9ecef;
      color: #111827;
      font-family: Arial, Helvetica, sans-serif;
    }

    .toolbar {
      position: sticky;
      top: 0;
      z-index: 10;
      display: flex;
      gap: 12px;
      align-items: center;
      padding: 12px 16px;
      background: #ffffff;
      border-bottom: 1px solid #d1d5db;
    }

    .toolbar input,
    .toolbar button {
      font: inherit;
    }

    .toolbar button {
      border: 0;
      border-radius: 6px;
      padding: 9px 14px;
      background: #00c48c;
      color: #ffffff;
      cursor: pointer;
      font-weight: 700;
    }

    .hint {
      color: #4b5563;
      font-size: 13px;
    }

    .sheet {
      width: 210mm;
      min-height: 297mm;
      margin: 18px auto;
      padding: 18mm 18mm 16mm;
      background: #ffffff;
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.18);
    }

    h1 {
      margin: 0 0 18px;
      font-size: 18px;
      line-height: 1.3;
    }

    .figure {
      break-inside: avoid;
      page-break-inside: avoid;
      margin: 0 0 22px;
    }

    .figure img {
      display: block;
      width: 78%;
      max-height: 170mm;
      object-fit: contain;
      margin: 0 auto 10px;
      border: 0;
    }

    .caption {
      margin: 0;
      font-size: 14px;
      line-height: 1.35;
      font-weight: 700;
    }

    .caption input {
      width: 100%;
      border: 0;
      border-bottom: 1px solid #cbd5e1;
      padding: 6px 0;
      font: inherit;
      font-weight: 700;
    }

    @media print {
      body {
        background: #ffffff;
      }

      .toolbar {
        display: none;
      }

      .sheet {
        width: auto;
        min-height: auto;
        margin: 0;
        padding: 0;
        box-shadow: none;
      }

      .caption input {
        border: 0;
      }
    }
  </style>
</head>
<body>
  <div class="toolbar">
    <input id="images" type="file" accept="image/*" multiple>
    <button type="button" onclick="window.print()">Exportar PDF</button>
    <span class="hint">Adicione as imagens na ordem certa, edite as legendas e exporte em PDF.</span>
  </div>

  <main class="sheet">
    <h1>Figuras do relatório</h1>
    <section id="figures"></section>
  </main>

  <script>
    const input = document.getElementById('images');
    const figures = document.getElementById('figures');

    input.addEventListener('change', () => {
      figures.innerHTML = '';

      Array.from(input.files).forEach((file, index) => {
        const url = URL.createObjectURL(file);
        const number = index + 1;

        const figure = document.createElement('figure');
        figure.className = 'figure';

        const image = document.createElement('img');
        image.src = url;
        image.alt = `Figura ${number}`;

        const caption = document.createElement('figcaption');
        caption.className = 'caption';

        const captionInput = document.createElement('input');
        captionInput.value = `${number}. Tela de cadastro`;
        captionInput.setAttribute('aria-label', `Legenda da figura ${number}`);

        caption.appendChild(captionInput);
        figure.appendChild(image);
        figure.appendChild(caption);
        figures.appendChild(figure);
      });
    });
  </script>
</body>
</html>
